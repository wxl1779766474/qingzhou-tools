<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="轻舟工具是一组轻量、好用的本地在线工具，包含二维码、JSON、Base64、URL、时间戳与文本统计。"
    />
    <meta name="theme-color" content="#f2f7f6" />
    <title>轻舟工具 · 轻量在线工具箱</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <a class="brand" href="./" aria-label="轻舟工具首页">
          <span class="brand-mark" aria-hidden="true">舟</span>
          <span class="brand-copy">
            <strong>轻舟工具</strong>
            <small>轻装上手，顺手即用</small>
          </span>
        </a>

        <div class="privacy-note" title="输入内容不会离开你的浏览器">
          <span class="privacy-dot" aria-hidden="true"></span>
          数据仅在本地处理
        </div>

        <div class="search-wrap">
          <span class="search-icon" aria-hidden="true"></span>
          <label class="sr-only" for="tool-search">搜索工具</label>
          <input
            id="tool-search"
            type="search"
            inputmode="search"
            autocomplete="off"
            placeholder="搜索工具"
          />
          <kbd aria-hidden="true">⌘K</kbd>
        </div>
      </header>

      <div class="app-body">
        <aside class="sidebar" aria-label="工具导航">
          <p class="sidebar-label">全部工具</p>
          <nav id="tool-nav" class="tool-nav mobile-tool-strip" aria-label="选择工具"></nav>
          <div class="sidebar-foot">
            <span aria-hidden="true">◎</span>
            <p><strong>安心使用</strong><br />所有转换均在本机完成</p>
          </div>
        </aside>

        <main id="workspace" class="workspace" tabindex="-1">
          <header id="tool-header" class="workspace-heading">
            <div>
              <p class="eyebrow">在线工具箱</p>
              <h1>选择一个工具开始</h1>
              <p>输入内容不会上传，处理快捷又安心。</p>
            </div>
          </header>
          <section id="tool-content" class="tool-content" aria-live="polite">
            <div class="empty-state">
              <span class="empty-state-mark" aria-hidden="true">舟</span>
              <h2>准备就绪</h2>
              <p>从左侧选择一个工具，即刻开始处理。</p>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div id="dialog-root"></div>
    <div id="history-root"></div>
    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./tools-core.js"></script>
    <script type="module" src="./qr.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
